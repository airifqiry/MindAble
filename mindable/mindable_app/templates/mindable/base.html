{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}MindAble{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'common.css' %}"/>
  {% block extra_css %}{% endblock %}
</head>
<body data-active-page="{% block active_page %}{% endblock %}">
  {% include 'mindable/partials/nav.html' %}

  {% block content %}{% endblock %}

  <script src="{% static 'common.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
